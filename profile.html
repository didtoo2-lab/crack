<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>캐릭터 상세 프로필</title>
    <style>
        /* 기본 스타일 */
        body { font-family: 'Pretendard', sans-serif; background-color: #f4f7fb; margin: 0; padding: 0; color: #333; }
        .top-nav { padding: 20px; max-width: 1000px; margin: 0 auto; }
        .back-btn { text-decoration: none; color: #4a7bb2; font-weight: bold; font-size: 1.1rem; display: inline-flex; align-items: center; transition: transform 0.2s; }
        .back-btn:hover { transform: translateX(-5px); }

        /* 상자 스타일 */
        .content-box { max-width: 1000px; margin: 0 auto 40px auto; background-color: #ffffff; border-radius: 20px; box-shadow: 0 10px 30px rgba(74, 123, 178, 0.08); overflow: hidden; }
        
        /* 프로필 상단 */
        .profile-section { display: flex; }
        .profile-image-box { flex: 0 0 40%; background-color: #eef2f6; position: relative; }
        .profile-image-box img { width: 100%; height: 100%; object-fit: cover; aspect-ratio: 1080 / 1620; display: block; }
        .profile-info-box { flex: 1; padding: 50px 40px; }
        .profile-title h1 { margin: 0 0 10px 0; font-size: 2.5rem; color: #334155; font-weight: 900; }
        .profile-title p { margin: 0 0 30px 0; font-size: 1.2rem; color: #64748b; font-weight: bold; }
        .info-list { list-style: none; padding: 0; margin: 0; border-top: 2px solid #e2e8f0; }
        .info-list li { display: flex; padding: 15px 0; border-bottom: 1px solid #f1f5f9; }
        .info-list .label { width: 100px; font-weight: 900; color: #4a7bb2; }
        .info-list .value { flex: 1; color: #475569; }

        /* 챗 설정 */
        .settings-section { padding: 40px; }
        .section-title { margin: 0 0 20px 0; font-size: 1.8rem; color: #334155; display: flex; align-items: center; gap: 10px; }
        .setting-block { background-color: #1e293b; color: #e2e8f0; padding: 20px; border-radius: 12px; font-family: monospace; font-size: 1rem; line-height: 1.6; white-space: pre-wrap; margin-bottom: 20px; }
        .setting-desc { color: #64748b; margin-bottom: 10px; font-weight: bold; }

        /* 갤러리 */
        .gallery-section { padding: 40px; }
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .photo-item { border-radius: 12px; overflow: hidden; aspect-ratio: 1 / 1; }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s; }
        .photo-item img:hover { transform: scale(1.1); }

        @media (max-width: 768px) {
            .profile-section { flex-direction: column; }
            .content-box { margin: 0 20px 30px 20px; }
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <a href="./" class="back-btn">⟵ 돌아가기</a>
    </nav>

    <main class="content-box profile-section">
        <div class="profile-image-box" id="main-img-container">
            </div>
        <div class="profile-info-box">
            <div class="profile-title">
                <h1 id="char-title">데이터를 불러오는 중...</h1>
                <p id="char-desc">잠시만 기다려주세요.</p>
            </div>
            <ul class="info-list" id="info-list-items">
            </ul>
        </div>
    </main>

    <section class="content-box settings-section">
        <h2 class="section-title">⚙️ 캐릭터 챗 설정</h2>
        <div class="setting-desc">배경 설정</div>
        <div id="char-prompt" class="setting-block"></div>
        <div class="setting-desc">TMI</div>
        <div id="char-firstmsg" class="setting-block"></div>
    </section>

    <section class="content-box gallery-section" id="gallery-container" style="display: none;">
        <h2 class="section-title">📸 추가 갤러리</h2>
        <div class="photo-grid" id="photo-grid-items">
        </div>
    </section>

    <script>
        // 📌 오타 하나 없이 깔끔하게 정리된 데이터베이스!
        const characterData = {
            "1": {
                title: "헤카테 이형재난통제부",
                desc: "괴수 재해가 일상화된 근미래, 헤카테 이형재난통제부의 신입이 되어보자.",
                mainImg: "https://raw.githubusercontent.com/didtoo2-lab/imgS/refs/heads/main/헤카테.webp",
                info: { "이름": "비공개", "나이": "불명", "성격": "까칠함", "소속": "암살단" },
                prompt: "[시스템 프롬프트 예시...]",
                firstmsg: "거기, 누구야?",
                gallery: []
            },
            "2": {
                title: "감각X연결",
                desc: "★ 감각 연결 딜0/오0홀 ★",
                mainImg: "char2_main.jpg",
                info: { "이름": "미상", "나이": "30대", "취미": "티타임" },
                prompt: "[관리인 설정...]",
                firstmsg: "어서 오세요.",
                gallery: []
            },
            "3": {
                title: "감금 황태자",
                desc: "어쩌다보니 황태자를 납치했다.",
                mainImg: "char2_main.jpg",
                info: { "이름": "에드리안(Adrian von Heldenreich)", "나이": "22", "신분/직업": "제국 황태자, 황위 계승 1순위","외형": "178cm, 탄탄한 체격·도도한 미남.금빛 장발·연두색 눈.흰 피부" },
                prompt: "[관리인 설정...]",
                firstmsg: "어서 오세요.",
                gallery: []
            },
            "12": {
                title: "부업하는 팀장님",
                desc: "싸가지 없는 팀장님을 수상한 가게에서 발견했다?!",
                mainImg: "https://raw.githubusercontent.com/didtoo2-lab/imgS/refs/heads/main/부업하는팀장님.webp",
                info: { "이름": "이준호", "나이": "35", "직업": "신생 it기업 팀장", "성격": "까칠·능글·사치·꼼꼼", "외형": "연갈색 머리·연갈색 눈·181cm" },
                prompt: `오늘도 팀장님에게 진창 깨지고 퇴근한 당신,
                짜증을 내며 집으로 돌아가던 도중
                홀리듯 "홀릭" 이라는 글로리홀 가게에 들어가게 되는데?

                익숙한 뒷태를 발견했다?`,
                firstmsg: `26세 회사입사,
                실력이 좋아 빠르게 팀장 승진 회사에서 싸가지 없는 팀장으로 유명, 
                사치 부리다가 빚더미에 앉게되어 부업을 시작
                처음엔 싫었지만 지금은 나름 즐기는중(본인은 부정)
                돔이라고 주장하는 서브미시브/마조/디그레이더/조루`,
                gallery: ["https://raw.githubusercontent.com/didtoo2-lab/imgS/refs/heads/main/이준호1.webp","https://raw.githubusercontent.com/didtoo2-lab/imgS/refs/heads/main/이준호2.webp","https://raw.githubusercontent.com/didtoo2-lab/imgS/refs/heads/main/이준호3.webp","https://raw.githubusercontent.com/didtoo2-lab/imgS/refs/heads/main/이준호4.webp"] 
            }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const charId = urlParams.get('id');
        const data = characterData[charId];

        // 데이터가 무사히 잘 연결됐을 때 실행할 일들
        if (data) {
            document.getElementById('char-title').innerText = data.title;
            document.getElementById('char-desc').innerText = data.desc;
            document.getElementById('char-prompt').innerText = data.prompt;
            document.getElementById('char-firstmsg').innerText = data.firstmsg;

            const infoList = document.getElementById('info-list-items');
            infoList.innerHTML = '';
            for (const [key, value] of Object.entries(data.info)) {
                infoList.innerHTML += `<li><span class="label">${key}</span><span class="value">${value}</span></li>`;
            }

            const mainImgBox = document.getElementById('main-img-container');
            mainImgBox.innerHTML = `<img src="${data.mainImg}" alt="${data.title}">`;

            if (data.gallery && data.gallery.length > 0) {
                document.getElementById('gallery-container').style.display = 'block';
                const photoGrid = document.getElementById('photo-grid-items');
                photoGrid.innerHTML = '';
                data.gallery.forEach(imgName => {
                    photoGrid.innerHTML += `<div class="photo-item"><img src="${imgName}" alt="갤러리 사진"></div>`;
                });
            }
        } else {
            // 주소창에 이상한 번호가 들어갔을 때 에러 띄워주기
            document.getElementById('char-title').innerText = "오류 발생!";
            document.getElementById('char-desc').innerText = "데이터를 찾을 수 없습니다. (id값을 확인하세요)";
        }
    </script>
</body>
</html>
