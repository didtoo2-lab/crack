<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>캐릭터 상세 프로필</title>
    <style>
        /* 기본 스타일 */
        body { font-family: 'Pretendard', sans-serif; background-color: #f4f7fb; margin: 0; padding: 0; color: #333; }
        .top-nav { padding: 20px; max-width: 1000px; margin: 0 auto; }
        .back-btn { text-decoration: none; color: #4a7bb2; font-weight: bold; font-size: 1.1rem; display: inline-flex; align-items: center; transition: transform 0.2s; }
        .back-btn:hover { transform: translateX(-5px); }

        /* 상자 스타일 */
        .content-box { max-width: 1000px; margin: 0 auto 40px auto; background-color: #ffffff; border-radius: 20px; box-shadow: 0 10px 30px rgba(74, 123, 178, 0.08); overflow: hidden; }
        
        /* 프로필 상단 */
        .profile-section { display: flex; }
        .profile-image-box { flex: 0 0 40%; background-color: #eef2f6; position: relative; }
        .profile-image-box img { width: 100%; height: 100%; object-fit: cover; aspect-ratio: 1080 / 1620; display: block; }
        .profile-info-box { flex: 1; padding: 50px 40px; }
        .profile-title h1 { margin: 0 0 10px 0; font-size: 2.5rem; color: #334155; font-weight: 900; }
        .profile-title p { margin: 0 0 30px 0; font-size: 1.2rem; color: #64748b; font-weight: bold; }
        .info-list { list-style: none; padding: 0; margin: 0; border-top: 2px solid #e2e8f0; }
        .info-list li { display: flex; padding: 15px 0; border-bottom: 1px solid #f1f5f9; }
        .info-list .label { width: 100px; font-weight: 900; color: #4a7bb2; }
        .info-list .value { flex: 1; color: #475569; }

        /* 챗 설정 */
        .settings-section { padding: 40px; }
        .section-title { margin: 0 0 20px 0; font-size: 1.8rem; color: #334155; display: flex; align-items: center; gap: 10px; }
        .setting-block { background-color: #1e293b; color: #e2e8f0; padding: 20px; border-radius: 12px; font-family: monospace; font-size: 1rem; line-height: 1.6; white-space: pre-wrap; margin-bottom: 20px; }
        .setting-desc { color: #64748b; margin-bottom: 10px; font-weight: bold; }

        /* 갤러리 */
        .gallery-section { padding: 40px; }
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .photo-item { border-radius: 12px; overflow: hidden; aspect-ratio: 1 / 1; }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s; }
        .photo-item img:hover { transform: scale(1.1); }

        @media (max-width: 768px) {
            .profile-section { flex-direction: column; }
            .content-box { margin: 0 20px 30px 20px; }
        }
        /* --- 📸 이미지 확대(모달) 스타일 --- */
        .modal {
            display: none; /* 평소엔 숨겨둠 */
            position: fixed;
            z-index: 1000; /* 화면 제일 앞쪽으로 띄우기 */
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85); /* 반투명한 검은 배경 */
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .modal-content {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: zoomIn 0.2s ease-out; /* 뿅! 하고 나타나는 애니메이션 */
        }

        @keyframes zoomIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* 갤러리랑 메인 사진에 마우스 올리면 클릭 손가락으로 바뀌게 설정 */
        .photo-item img, .profile-image-box img {
            cursor: pointer;
        }
        /* --- 💬 캐릭터 챗 이동 버튼 스타일 --- */
        .chat-btn {
            display: inline-flex;
            align-items: center;
            background-color: #334155;
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 900;
            font-size: 1.1rem;
            margin-top: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 12px rgba(51, 65, 85, 0.2);
            transition: all 0.2s ease;
        }
        
        .chat-btn:hover {
            background-color: #4a7bb2;
            transform: translateY(-3px);
            box-shadow: 0 8px 16px rgba(74, 123, 178, 0.3);
        }
    </style>
</head>
